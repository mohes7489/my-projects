<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my clock project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="container">
            <div class="clock">
                <span id="hours">00</span>
                <span>:</span>
                <span id="mins">00</span>
                <span>:</span>
                <span id="sec">00</span>
            </div>
        </div>
    </div>
    <script>
        setInterval(() => {
            let currTimes = new Date();
            let hours = document.getElementById("hours");
            hours.innerHTML = currTimes.getHours();
            let mintes = document.getElementById("mins");
            mintes.innerHTML = currTimes.getMinutes();
            let seconds = document.getElementById("sec");
            seconds.innerHTML = (currTimes.getSeconds()<10? '0': '' )+ currTimes.getSeconds();
        }, 1000);
            
        
    </script>
</body>
</html>
